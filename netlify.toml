# ============================================
# ChainFund — Netlify Deployment Configuration
# ============================================
# Netlify hosts the Vite/React SPA (frontend).
# The Express + SQLite backend must be hosted separately
# (Railway, Render, Fly.io, etc.).
#
# After deploying the backend, set the environment variable:
#   VITE_API_URL = https://your-backend-url.com/api
# in Netlify → Site Settings → Build & Deploy → Environment Variables.
# ============================================

[build]
  command   = "npm run build"
  publish   = "dist"

# Environment variables for the build
[build.environment]
  NODE_VERSION = "20"
  # VITE_API_URL is set via Netlify UI (site settings)

# SPA fallback — all routes go to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Deploy previews for PRs
[context.deploy-preview]
  command = "npm run build"

# Branch deploys
[context.branch-deploy]
  command = "npm run build"
